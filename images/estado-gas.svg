<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="gas" cx="0.5" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#fff4b8" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#ffe57a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4d35a" stop-opacity="0.10"/>
    </radialGradient>
    <linearGradient id="flaskGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.20"/>
    </linearGradient>
    <clipPath id="bulbClip">
      <path d="M200 150 C150 150 96 196 96 262 C96 322 144 360 200 360 C256 360 304 322 304 262 C304 196 250 150 200 150 Z"/>
    </clipPath>
    <filter id="gGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="200" cy="372" rx="100" ry="18" fill="#0a2f44" opacity="0.4"/>
  <g filter="url(#gGlow)">
    <!-- gas cloud clipped inside the bulb -->
    <g clip-path="url(#bulbClip)">
      <rect x="80" y="150" width="240" height="220" fill="url(#gas)"/>
      <circle cx="170" cy="250" r="9" fill="#fff7cc" opacity="0.85"/>
      <circle cx="232" cy="232" r="7" fill="#fff7cc" opacity="0.8"/>
      <circle cx="210" cy="300" r="8" fill="#fff7cc" opacity="0.8"/>
      <circle cx="150" cy="305" r="6" fill="#fff7cc" opacity="0.75"/>
      <circle cx="255" cy="290" r="6" fill="#fff7cc" opacity="0.7"/>
      <circle cx="195" cy="205" r="5" fill="#fff7cc" opacity="0.7"/>
    </g>
    <!-- bulb outline -->
    <path d="M200 150 C150 150 96 196 96 262 C96 322 144 360 200 360 C256 360 304 322 304 262 C304 196 250 150 200 150 Z"
          fill="url(#flaskGlass)" stroke="#eaf8ff" stroke-width="3.5" stroke-opacity="0.8"/>
    <!-- neck -->
    <path d="M178 60 L180 168 Q200 178 220 168 L222 60 Z" fill="url(#flaskGlass)" stroke="#eaf8ff" stroke-width="3.5" stroke-opacity="0.8"/>
    <!-- mouth rim -->
    <ellipse cx="200" cy="60" rx="24" ry="7" fill="none" stroke="#eaf8ff" stroke-width="3.5" stroke-opacity="0.9"/>
    <!-- glass highlight -->
    <path d="M140 215 Q120 270 150 320" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.45" stroke-linecap="round"/>
  </g>
</svg>
