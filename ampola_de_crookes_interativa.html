<h2 class="sr-only">Ampola de Crookes interativa em orientação vertical: botão liga/desliga que faz um raio catódico verde crescer do cátodo ao ânodo como um sabre de luz, com hélice e placas de deflexão removíveis e ligada a uma bateria.</h2>
<style>
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
#amp .seg{stroke-dasharray:1000;stroke-dashoffset:1000;transition:stroke-dashoffset .72s cubic-bezier(.2,.7,.2,1);stroke-linecap:round;fill:none}
#amp.on .seg{stroke-dashoffset:0}
#amp .cglow{opacity:0;transition:opacity .5s ease .12s}
#amp.on .cglow{opacity:1}
#amp .tubeglow{opacity:0;transition:opacity .6s ease .1s}
#amp.on .tubeglow{opacity:.13}
#amp .raylabel{opacity:0;transition:opacity .4s ease .35s}
#amp.on .raylabel{opacity:1}
#amp .flow{opacity:0}
#amp.on .flow{opacity:.9}
#prop{transform-box:fill-box;transform-origin:center;opacity:1;transform:translateY(0);transition:opacity .42s ease,transform .42s cubic-bezier(.34,1.4,.5,1)}
#prop.gone{opacity:0;transform:translateY(48px)}
.wheel{transform-box:fill-box;transform-origin:center}
.bl{fill:#aeb6bf;stroke:#79818b;stroke-width:.8}
#plateL,#plateR{transform-box:fill-box;transition:opacity .42s ease,transform .42s cubic-bezier(.34,1.35,.5,1)}
#plateL.gone{opacity:0;transform:translateX(-32px)}
#plateR.gone{opacity:0;transform:translateX(32px)}
@media (prefers-reduced-motion: no-preference){
#amp.on #prop:not(.gone) .wheel{animation:spin 1.05s linear infinite}
#amp.on .flow{animation:march 1s linear infinite}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes march{to{stroke-dashoffset:-130}}
.cbtn{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
</style>

<script>
(function(){
var amp=document.getElementById('amp');
var prop=document.getElementById('prop');
var plateL=document.getElementById('plateL');
var plateR=document.getElementById('plateR');
var segs=document.querySelectorAll('#beamGroup .seg');
var powerBtn=document.getElementById('powerBtn');
var propBtn=document.getElementById('propBtn');
var plateBtn=document.getElementById('plateBtn');
var on=false, hasProp=true, hasPlates=true;
var straightD="M190 505 Q190 360 190 158";
var bentD="M190 505 Q216 360 190 158";
function setBeam(){var d=hasPlates?bentD:straightD;segs.forEach(function(p){p.setAttribute('d',d);});}
function render(){
 amp.classList.toggle('on',on);
 powerBtn.querySelector('span').textContent=on?'Desligar':'Ligar';
 powerBtn.querySelector('i').className=on?'ti ti-bolt':'ti ti-power';
 powerBtn.style.background=on?'var(--bg-success)':'';
 powerBtn.style.color=on?'var(--text-success)':'';
 powerBtn.style.borderColor=on?'var(--border-success)':'';
 powerBtn.setAttribute('aria-pressed',on);
 prop.classList.toggle('gone',!hasProp);
 propBtn.style.background=hasProp?'var(--bg-accent)':'';
 propBtn.style.color=hasProp?'var(--text-accent)':'var(--text-secondary)';
 propBtn.style.borderColor=hasProp?'var(--border-accent)':'';
 propBtn.setAttribute('aria-pressed',hasProp);
 plateL.classList.toggle('gone',!hasPlates);
 plateR.classList.toggle('gone',!hasPlates);
 plateBtn.style.background=hasPlates?'var(--bg-accent)':'';
 plateBtn.style.color=hasPlates?'var(--text-accent)':'var(--text-secondary)';
 plateBtn.style.borderColor=hasPlates?'var(--border-accent)':'';
 plateBtn.setAttribute('aria-pressed',hasPlates);
}
powerBtn.onclick=function(){on=!on;render();};
propBtn.onclick=function(){hasProp=!hasProp;render();};
plateBtn.onclick=function(){hasPlates=!hasPlates;setBeam();render();};
setBeam();render();
})();
</script>
