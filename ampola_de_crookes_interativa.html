<h2 class="sr-only">Ampola de Crookes interativa em orientação vertical: botão liga/desliga que faz um raio catódico verde crescer do cátodo ao ânodo como um sabre de luz, com hélice e placas de deflexão removíveis e ligada a uma bateria.</h2>
<style>
html,body{margin:0;background:transparent;overflow:hidden}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#fff;padding:0}
.amp-wrap{position:relative;width:100%}
/* controles compactos DENTRO do retângulo (faixa de baixo) */
.amp-ctrls{position:absolute;left:0;right:0;bottom:1.6%;display:flex;align-items:center;justify-content:center;gap:clamp(10px,4vw,18px);padding:0 8px}
.amp-sw{position:relative;width:52px;height:27px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);cursor:pointer;padding:0;flex-shrink:0;transition:background .25s,border-color .25s;-webkit-tap-highlight-color:transparent}
.amp-sw::after{content:'';position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;background:#cfd6dd;transition:left .28s cubic-bezier(.4,1.4,.5,1),background .25s,box-shadow .25s}
.amp-sw.on{background:rgba(57,255,20,.22);border-color:rgba(57,255,20,.6)}
.amp-sw.on::after{left:27px;background:#39ff14;box-shadow:0 0 11px rgba(57,255,20,.85)}
.amp-ib{position:relative;width:42px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cdd3da;flex-shrink:0;transition:background .25s,border-color .25s,color .25s;-webkit-tap-highlight-color:transparent}
.amp-ib svg{width:21px;height:21px;display:block}
.amp-ib .led{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:background .25s,box-shadow .25s}
.amp-ib.helice.on{border-color:rgba(80,150,255,.6);background:rgba(80,150,255,.16);color:#9cc8ff}
.amp-ib.helice.on .led{background:#4d8bff;box-shadow:0 0 8px rgba(80,150,255,.95)}
.amp-ib.placas.on{border-color:rgba(255,138,92,.6);background:rgba(255,138,92,.16);color:#ffb38f}
.amp-ib.placas.on .led{background:#ff8a5c;box-shadow:0 0 8px rgba(255,138,92,.95)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
#amp .seg{stroke-dasharray:1000;stroke-dashoffset:1000;transition:stroke-dashoffset .72s cubic-bezier(.2,.7,.2,1);stroke-linecap:round;fill:none}
#amp.on .seg{stroke-dashoffset:0}
/* raio catódico intermitente (pisca de vez em quando, não fica contínuo) */
#amp.on #beamGroup{animation:rayFlicker 4.8s linear infinite}
#amp.on .cglow{animation:rayFlicker 4.8s linear infinite}
@keyframes rayFlicker{0%{opacity:1}18%{opacity:1}19%{opacity:.4}20.5%{opacity:1}46%{opacity:1}47%{opacity:.6}47.7%{opacity:1}48.5%{opacity:.35}49.8%{opacity:1}74%{opacity:1}75%{opacity:.5}76.5%{opacity:1}100%{opacity:1}}
#amp .cglow{opacity:0;transition:opacity .5s ease .12s}
#amp.on .cglow{opacity:1}
#amp .tubeglow{opacity:0;transition:opacity .6s ease .1s}
#amp.on .tubeglow{opacity:.13}
#amp .raylabel{opacity:0;transition:opacity .4s ease .35s}
#amp.on .raylabel{opacity:1}
#amp .flow{opacity:0}
#amp.on .flow{opacity:.9}
#prop{transform-box:fill-box;transform-origin:center;opacity:1;transform:translateY(0);transition:opacity .42s ease,transform .42s cubic-bezier(.34,1.4,.5,1)}
#prop.gone{opacity:0;transform:translateY(48px)}
.wheel{transform-box:fill-box;transform-origin:center}
.bl{fill:url(#metalV);stroke:#565e67;stroke-width:.7}
#plateL,#plateR{transform-box:fill-box;transition:opacity .42s ease,transform .42s cubic-bezier(.34,1.35,.5,1)}
#plateL.gone{opacity:0;transform:translateX(-32px)}
#plateR.gone{opacity:0;transform:translateX(32px)}
@media (prefers-reduced-motion: no-preference){
#amp.on .flow{animation:march 1s linear infinite}
}
@keyframes march{to{stroke-dashoffset:-130}}
.cbtn{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
</style>

<script>
(function(){
var amp=document.getElementById('amp');
var prop=document.getElementById('prop');
var plateL=document.getElementById('plateL');
var plateR=document.getElementById('plateR');
var segs=document.querySelectorAll('#beamGroup .seg');
var powerBtn=document.getElementById('powerBtn');
var propBtn=document.getElementById('propBtn');
var plateBtn=document.getElementById('plateBtn');
var on=false, hasProp=false, hasPlates=false;
var straightD="M190 505 Q190 360 190 158";
var bentD="M190 505 Q216 360 190 158";
function setBeam(){var d=hasPlates?bentD:straightD;segs.forEach(function(p){p.setAttribute('d',d);});}
/* gira a hélice via JS: começa devagarzinho (fazendo força) e acelera; sentido invertido */
var wheelEl=document.querySelector('#prop .wheel');
var wAngle=0, wVel=0, wRAF=0, wLast=0;
function wheelTick(ts){
 if(!wLast){ wLast=ts; }
 var dt=Math.min(0.05,(ts-wLast)/1000); wLast=ts;
 var spinning=(on && hasProp);
 var target=spinning?300:0;                 /* deg/s no regime */
 wVel += (target-wVel)*Math.min(1,dt*0.8);  /* rampa lenta no início */
 wAngle=(wAngle - wVel*dt)%360;             /* sinal negativo = sentido invertido */
 if(wheelEl){ wheelEl.style.transform='rotate('+wAngle.toFixed(2)+'deg)'; }
 if(spinning || wVel>0.4){ wRAF=requestAnimationFrame(wheelTick); }
 else { wVel=0; wLast=0; wRAF=0; }
}
function syncWheel(){ if(!wRAF){ wLast=0; wRAF=requestAnimationFrame(wheelTick); } }
function render(){
 amp.classList.toggle('on',on);
 powerBtn.classList.toggle('on',on);
 powerBtn.setAttribute('aria-pressed',on);
 prop.classList.toggle('gone',!hasProp);
 propBtn.classList.toggle('on',hasProp);
 propBtn.setAttribute('aria-pressed',hasProp);
 plateL.classList.toggle('gone',!hasPlates);
 plateR.classList.toggle('gone',!hasPlates);
 plateBtn.classList.toggle('on',hasPlates);
 plateBtn.setAttribute('aria-pressed',hasPlates);
 syncWheel();
}
var raysAudio=null, fanAudio=null, sfx={};
function rays(state){
 try{
  if(!raysAudio){ raysAudio=new Audio('audio/raios_catodicos.mp3'); raysAudio.loop=true; }
  if(state){ var p=raysAudio.play(); if(p&&p.catch){ p.catch(function(){}); } } else { try{ raysAudio.pause(); }catch(_){} }
 }catch(_){}
}
function fan(state){
 try{
  if(!fanAudio){ fanAudio=new Audio('audio/micro_fan.mp3'); fanAudio.loop=true; }
  if(state){ var p=fanAudio.play(); if(p&&p.catch){ p.catch(function(){}); } } else { try{ fanAudio.pause(); }catch(_){} }
 }catch(_){}
}
/* efeito sonoro curto (one-shot): clique dos botões, som das placas */
function sound(name){ try{ var a=sfx[name]; if(!a){ a=sfx[name]=new Audio('audio/'+name); } try{ a.currentTime=0; }catch(_){} var p=a.play(); if(p&&p.catch){ p.catch(function(){}); } }catch(_){} }
var wasSpinning=false;
function updateFan(){   /* o som da hélice só toca enquanto ela GIRA (máquina ligada E hélice ativa) */
 var spin=(on && hasProp);
 if(spin){ fan(true); }
 else { fan(false); if(wasSpinning){ sound('micro_fan_off.mp3'); } }   /* ao parar: corta o micro_fan e toca o "off" uma vez */
 wasSpinning=spin;
}
powerBtn.onclick=function(){ sound('click_sound.m4a'); on=!on; rays(on); updateFan(); render(); };
propBtn.onclick=function(){ sound('click_sound.m4a'); hasProp=!hasProp; updateFan(); render(); };
plateBtn.onclick=function(){ sound('click_sound.m4a'); hasPlates=!hasPlates; if(hasPlates){ sound('plates.mp3'); } setBeam(); render(); };
/* a página pai pede pra resetar/parar tudo ao sair da cena */
window.addEventListener('message',function(e){ if(e&&e.data&&e.data.amp==='stop'){ on=false; hasProp=false; hasPlates=false; wasSpinning=false; rays(false); fan(false); setBeam(); render(); } });
/* pausa os sons de fundo ao perder o foco; retoma o que estiver ligado ao voltar */
document.addEventListener('visibilitychange',function(){ if(document.hidden){ if(raysAudio){try{raysAudio.pause();}catch(_){}} if(fanAudio){try{fanAudio.pause();}catch(_){}} } else { if(on){ rays(true); } if(on && hasProp){ fan(true); } } });
setBeam();render();
})();
</script>
