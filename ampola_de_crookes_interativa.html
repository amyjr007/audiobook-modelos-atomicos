<h2 class="sr-only">Ampola de Crookes interativa em orientação vertical: botão liga/desliga que faz um raio catódico verde crescer do cátodo ao ânodo como um sabre de luz, com hélice e placas de deflexão removíveis e ligada a uma bateria.</h2>
<style>
html,body{margin:0;background:transparent;overflow:hidden}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#fff;padding:0}
.amp-wrap{position:relative;width:100%}
/* controles compactos DENTRO do retângulo (faixa de baixo) */
/* controles na lateral DIREITA do retângulo, de baixo p/ cima: On/off, hélice, placas */
.amp-ctrls{position:absolute;right:3.5%;bottom:9%;display:flex;flex-direction:column-reverse;align-items:center;gap:clamp(9px,2.6vw,15px)}
.amp-sw{position:relative;width:52px;height:27px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);cursor:pointer;padding:0;flex-shrink:0;transition:background .25s,border-color .25s;-webkit-tap-highlight-color:transparent}
.amp-sw::after{content:'';position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;background:#cfd6dd;transition:left .28s cubic-bezier(.4,1.4,.5,1),background .25s,box-shadow .25s}
.amp-sw.on{background:rgba(57,255,20,.22);border-color:rgba(57,255,20,.6)}
.amp-sw.on::after{left:27px;background:#39ff14;box-shadow:0 0 11px rgba(57,255,20,.85)}
.amp-ib{position:relative;width:42px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cdd3da;flex-shrink:0;transition:background .25s,border-color .25s,color .25s;-webkit-tap-highlight-color:transparent}
.amp-ib svg{width:21px;height:21px;display:block}
.amp-ib .led{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:background .25s,box-shadow .25s}
.amp-ib.helice.on{border-color:rgba(80,150,255,.6);background:rgba(80,150,255,.16);color:#9cc8ff}
.amp-ib.helice.on .led{background:#4d8bff;box-shadow:0 0 8px rgba(80,150,255,.95)}
.amp-ib.placas.on{border-color:rgba(255,138,92,.6);background:rgba(255,138,92,.16);color:#ffb38f}
.amp-ib.placas.on .led{background:#ff8a5c;box-shadow:0 0 8px rgba(255,138,92,.95)}
/* botão travado: aparece apagado e não responde ao toque */
.amp-sw.locked,.amp-ib.locked{opacity:.4;pointer-events:none;filter:saturate(.4)}
/* mãozinha "Ligue a máquina" apontando p/ o botão On/off */
/* mãozinha logo ABAIXO do botão On/off (☝️ apontando p/ cima nele) */
.amp-hint{position:absolute;right:calc(3.5% + 12px);bottom:3%;display:flex;align-items:center;gap:5px;z-index:6;opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease;pointer-events:none}
.amp-hint.in{opacity:1;transform:translateY(0)}
.amp-hint-txt{font:700 12.5px/1.05 'Plus Jakarta Sans',system-ui,sans-serif;color:#ffe0b0;background:rgba(18,12,6,.74);padding:5px 8px;border-radius:8px;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.amp-hint-hand{font-size:28px;animation:ampPoint 1s ease-in-out infinite;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
@keyframes ampPoint{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
#amp .seg{stroke-dasharray:1000;stroke-dashoffset:1000;transition:stroke-dashoffset .72s cubic-bezier(.2,.7,.2,1);stroke-linecap:round;fill:none}
#amp.on .seg{stroke-dashoffset:0}
/* raio catódico intermitente (pisca de vez em quando, não fica contínuo) */
#amp.on #beamGroup{animation:rayFlicker 4.8s linear infinite}
#amp.on .cglow{animation:rayFlicker 4.8s linear infinite}
@keyframes rayFlicker{0%{opacity:1}18%{opacity:1}19%{opacity:.4}20.5%{opacity:1}46%{opacity:1}47%{opacity:.6}47.7%{opacity:1}48.5%{opacity:.35}49.8%{opacity:1}74%{opacity:1}75%{opacity:.5}76.5%{opacity:1}100%{opacity:1}}
#amp .cglow{opacity:0;transition:opacity .5s ease .12s}
#amp.on .cglow{opacity:1}
#amp .tubeglow{opacity:0;transition:opacity .6s ease .1s}
#amp.on .tubeglow{opacity:.13}
#amp .raylabel{opacity:0;transition:opacity .5s ease}
#amp.on.showlabel .raylabel{opacity:1}   /* o nome "Raios catódicos" só aparece quando a pág. pai pedir */
/* "cátodo (–)" pulsa por ~1s quando a pág. pai pedir */
.catlabel{transform-box:fill-box;transform-origin:center}
.catlabel.pulse{animation:catPulse .34s ease-in-out 3}
@keyframes catPulse{0%,100%{transform:scale(1);fill:#cdd3da}50%{transform:scale(1.2);fill:#ffd24a}}
/* ênfase na placa positiva (quando a pág. pai pedir) */
#plateR.emph{animation:platePulse .5s ease-in-out 2}
@keyframes platePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
#amp .flow{opacity:0}
#amp.on .flow{opacity:.9}
#prop{transform-box:fill-box;transform-origin:center;opacity:1;transform:translateY(0);transition:opacity .42s ease,transform .42s cubic-bezier(.34,1.4,.5,1)}
#prop.gone{opacity:0;transform:translateY(48px)}
.wheel{transform-box:fill-box;transform-origin:center}
.bl{fill:url(#metalV);stroke:#565e67;stroke-width:.7}
#plateL,#plateR{transform-box:fill-box;transition:opacity .42s ease,transform .42s cubic-bezier(.34,1.35,.5,1)}
#plateL.gone{opacity:0;transform:translateX(-32px)}
#plateR.gone{opacity:0;transform:translateX(32px)}
@media (prefers-reduced-motion: no-preference){
#amp.on .flow{animation:march 1s linear infinite}
}
@keyframes march{to{stroke-dashoffset:-130}}
.cbtn{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
/* dialogo3.5.9: somem os raios + fluxo de elétrons */
#amp.e9hide #beamGroup{animation:none !important;opacity:0;transition:opacity .8s ease}
#amp.e9hide .cglow{animation:none !important;opacity:0;transition:opacity .8s ease}

#e9label{opacity:0;transition:opacity .55s ease}
#e9label.in{opacity:1}

var on=false, hasProp=false, hasPlates=false;
var straightD="M190 505 Q190 360 190 158";
var bentD="M190 505 Q236 360 190 158";   /* atração mais exagerada em direção à placa + */
function setBeam(){var d=hasPlates?bentD:straightD;segs.forEach(function(p){p.setAttribute('d',d);});}
/* gira a hélice via JS: começa devagarzinho (fazendo força) e acelera; sentido invertido */
var wheelEl=document.querySelector('#prop .wheel');
var wAngle=0, wVel=0, wRAF=0, wLast=0;
function wheelTick(ts){
 if(!wLast){ wLast=ts; }
 var dt=Math.min(0.05,(ts-wLast)/1000); wLast=ts;
 var spinning=(on && hasProp);
 var MAXV=60;                               /* máx = 20% da velocidade anterior (300) */
 if(spinning){ wVel += (6 + wVel*0.5)*dt; if(wVel>MAXV){ wVel=MAXV; } }      /* ease-in: começa bem devagarzinho e acelera */
 else { wVel += (0 - wVel)*Math.min(1, dt*1.6); if(wVel<0.4){ wVel=0; } }    /* desacelera ao parar */
 wAngle=(wAngle - wVel*dt)%360;             /* sinal negativo = sentido invertido */
 if(wheelEl){ wheelEl.style.transform='rotate('+wAngle.toFixed(2)+'deg)'; }
 if(spinning || wVel>0.4){ wRAF=requestAnimationFrame(wheelTick); }
 else { wVel=0; wLast=0; wRAF=0; }
}
function syncWheel(){ if(!wRAF){ wLast=0; wRAF=requestAnimationFrame(wheelTick); } }
function render(){
 amp.classList.toggle('on',on);
 powerBtn.classList.toggle('on',on);
 powerBtn.setAttribute('aria-pressed',on);
 prop.classList.toggle('gone',!hasProp);
 propBtn.classList.toggle('on',hasProp);
 propBtn.setAttribute('aria-pressed',hasProp);
 plateL.classList.toggle('gone',!hasPlates);
 plateR.classList.toggle('gone',!hasPlates);
 plateBtn.classList.toggle('on',hasPlates);
 plateBtn.setAttribute('aria-pressed',hasPlates);
 syncWheel();
}
var raysAudio=null, fanAudio=null, sfx={};
function rays(state){
 try{
  if(!raysAudio){ raysAudio=new Audio('audio/raios_catodicos.mp3'); raysAudio.loop=true; raysAudio.volume=0.3; }   /* -70% e em loop contínuo */
  if(state){ var p=raysAudio.play(); if(p&&p.catch){ p.catch(function(){}); } } else { try{ raysAudio.pause(); }catch(_){} }
 }catch(_){}
}
var FAN_LOOP_START=2.5, FAN_LOOP_END=10.0;   /* loop só na seção do meio do micro_fan.mp3 (12s) */
function fan(state){
 try{
  if(!fanAudio){
   fanAudio=new Audio('audio/micro_fan.mp3'); fanAudio.loop=false; fanAudio.volume=0.5;   /* -50% intensidade */
   fanAudio.addEventListener('timeupdate',function(){ if(fanAudio.currentTime>=FAN_LOOP_END){ try{ fanAudio.currentTime=FAN_LOOP_START; }catch(_){} } });
   fanAudio.addEventListener('ended',function(){ try{ fanAudio.currentTime=FAN_LOOP_START; var pp=fanAudio.play(); if(pp&&pp.catch){ pp.catch(function(){}); } }catch(_){} });   /* segurança: não recomeça do 0 */
  }
  if(state){ var p=fanAudio.play(); if(p&&p.catch){ p.catch(function(){}); } }   /* toca da posição atual (0 = começo, com a "partida") */
  else { try{ fanAudio.pause(); fanAudio.currentTime=0; }catch(_){} }            /* ao parar, volta pro começo p/ a próxima partida */
 }catch(_){}
}
/* efeito sonoro curto (one-shot): clique dos botões, som das placas */
var SFX_VOL={ 'click_sound2.mp3':0.5, 'micro_fan_off.mp3':0.5 };   /* -50% intensidade */
function sound(name){ try{ var a=sfx[name]; if(!a){ a=sfx[name]=new Audio('audio/'+name); if(SFX_VOL[name]!=null){ a.volume=SFX_VOL[name]; } } try{ a.currentTime=0; }catch(_){} var p=a.play(); if(p&&p.catch){ p.catch(function(){}); } }catch(_){} }
var wasSpinning=false;
function updateFan(){   /* o som da hélice só toca enquanto ela GIRA (máquina ligada E hélice ativa) */
 var spin=(on && hasProp);
 if(spin){ fan(true); }
 else { fan(false); if(wasSpinning){ sound('micro_fan_off.mp3'); } }   /* ao parar: corta o micro_fan e toca o "off" uma vez */
 wasSpinning=spin;
}
/* estado de travamento dos botões (controlado pela página pai). true = travado */
var ampHint=document.getElementById('ampHint');
var btnLock={power:true,prop:true,plate:true};   /* tudo travado por padrão até a página pai liberar */
function applyLocks(){
 powerBtn.classList.toggle('locked', btnLock.power);
 propBtn.classList.toggle('locked', btnLock.prop);
 plateBtn.classList.toggle('locked', btnLock.plate);
}
function showHint(s){ if(ampHint){ ampHint.classList.toggle('in', !!s); } }
powerBtn.onclick=function(){ if(btnLock.power){ return; } sound('click_sound.m4a'); on=!on; rays(on); updateFan(); render(); if(on){ showHint(false); try{ parent.postMessage({ampEvt:'userPowerOn'},'*'); }catch(_){} } };
propBtn.onclick=function(){ if(btnLock.prop){ return; } sound('click_sound2.mp3'); hasProp=!hasProp; updateFan(); render(); };
plateBtn.onclick=function(){ if(btnLock.plate){ return; } hasPlates=!hasPlates; sound('plates.mp3'); setBeam(); render(); };   /* mesmo som na entrada e na saída */
/* mensagens da página pai */
window.addEventListener('message',function(e){
 var d=e&&e.data; if(!d||!d.amp){ return; }
 if(d.amp==='stop'){ on=false; hasProp=false; hasPlates=false; wasSpinning=false; rays(false); fan(false); btnLock={power:true,prop:true,plate:true}; applyLocks(); showHint(false); amp.classList.remove('showlabel'); e9('reset'); setBeam(); render(); return; }   /* reset + trava tudo */
 if(d.amp==='btns'){ if(d.power!=null){ btnLock.power=!d.power; } if(d.prop!=null){ btnLock.prop=!d.prop; } if(d.plate!=null){ btnLock.plate=!d.plate; } applyLocks(); return; }   /* libera/trava botões */
 if(d.amp==='power'){ on=!!d.on; rays(on); updateFan(); render(); if(!on){ showHint(false); amp.classList.remove('showlabel'); } return; }   /* liga/desliga programático */
 if(d.amp==='prop'){ hasProp=!!d.on; updateFan(); render(); return; }   /* liga/desliga a hélice programaticamente */
 if(d.amp==='plate'){ hasPlates=!!d.on; setBeam(); render(); return; }   /* coloca/tira as placas programaticamente */
 if(d.amp==='hand'){ showHint(!!d.show); return; }   /* mãozinha */
 if(d.amp==='raylabel'){ amp.classList.toggle('showlabel', !!d.show); return; }   /* nome "Raios catódicos" */
 if(d.amp==='pulseCathode'){ var cl=document.querySelector('.catlabel'); if(cl){ cl.classList.remove('pulse'); cl.getBoundingClientRect(); cl.classList.add('pulse'); setTimeout(function(){ cl.classList.remove('pulse'); }, 1150); } return; }   /* pulsa "cátodo (–)" ~1s */
 if(d.amp==='pulsePlate'){ var pr=document.getElementById('plateR'); if(pr){ pr.classList.remove('emph'); pr.getBoundingClientRect(); pr.classList.add('emph'); setTimeout(function(){ pr.classList.remove('emph'); }, 1100); } return; }   /* enfatiza a placa positiva */
 if(d.amp==='e9'){ e9(d.act); return; }   /* dialogo3.5.9: fluxo de elétrons */
});
/* pausa os sons de fundo ao perder o foco; retoma o que estiver ligado ao voltar */
document.addEventListener('visibilitychange',function(){ if(document.hidden){ if(raysAudio){try{raysAudio.pause();}catch(_){}} if(fanAudio){try{fanAudio.pause();}catch(_){}} } else { if(on){ rays(true); } if(on && hasProp){ fan(true); } } });
/* ===================== dialogo3.5.9: fluxo de elétrons ===================== */
var SVGNS='http://www.w3.org/2000/svg';
var e9flow=document.getElementById('e9flow');
var e9feat=document.getElementById('e9feat');
var e9featTrans=e9feat?e9feat.querySelector('.ftrans'):null;
var e9label=document.getElementById('e9label');
var e9St={on:false, arc:false, raf:0, last:0, acc:0, parts:[]};
var E9_SPAWN=0.30;                 /* novo elétron a cada 0.30s */
var E9_SPEED=0.42;                 /* t por segundo (~2.4s do cátodo ao ânodo) */
var E9P0={x:190,y:503}, E9C={x:258,y:330}, E9P2={x:190,y:160};   /* cátodo -> (arco rumo à placa +) -> ânodo */
function e9pos(t,arc){
 if(!arc){ return {x:190, y:E9P0.y+(E9P2.y-E9P0.y)*t}; }
 var u=1-t;
 return { x:u*u*E9P0.x + 2*u*t*E9C.x + t*t*E9P2.x, y:u*u*E9P0.y + 2*u*t*E9C.y + t*t*E9P2.y };
}
function e9spawn(){
 if(!e9flow){ return; }
 var g=document.createElementNS(SVGNS,'g'); g.setAttribute('class','e9p'+(e9St.arc?' arc':''));
 var c=document.createElementNS(SVGNS,'circle'); c.setAttribute('r','3.2');
 var s=document.createElementNS(SVGNS,'text'); s.setAttribute('class','sgn'); s.setAttribute('x','0'); s.setAttribute('y','2.3'); s.setAttribute('text-anchor','middle'); s.textContent='−';
 g.appendChild(c); g.appendChild(s); e9flow.appendChild(g);
 e9St.parts.push({el:g,t:0});
}
function e9tick(ts){
 if(!e9St.last){ e9St.last=ts; }
 var dt=Math.min(0.05,(ts-e9St.last)/1000); e9St.last=ts;
 if(e9St.on){ e9St.acc+=dt; while(e9St.acc>=E9_SPAWN){ e9St.acc-=E9_SPAWN; e9spawn(); } }
 for(var i=e9St.parts.length-1;i>=0;i--){
  var p=e9St.parts[i]; p.t+=E9_SPEED*dt;
  if(p.t>=1){ if(p.el&&p.el.parentNode){ p.el.parentNode.removeChild(p.el); } e9St.parts.splice(i,1); continue; }
  var q=e9pos(p.t,e9St.arc); p.el.setAttribute('transform','translate('+q.x.toFixed(1)+' '+q.y.toFixed(1)+')');
 }
 if(e9St.on || e9St.parts.length){ e9St.raf=requestAnimationFrame(e9tick); } else { e9St.raf=0; e9St.last=0; }
}
function e9go(){ if(!e9St.raf){ e9St.last=0; e9St.raf=requestAnimationFrame(e9tick); } }
function e9(act){
 if(act==='reset'){
  e9St.on=false; e9St.arc=false; e9St.acc=0;
  for(var i=0;i<e9St.parts.length;i++){ var el=e9St.parts[i].el; if(el&&el.parentNode){ el.parentNode.removeChild(el); } }
  e9St.parts=[]; amp.classList.remove('e9hide');
  if(e9feat){ e9feat.classList.remove('in'); } if(e9label){ e9label.classList.remove('in'); }
  if(e9featTrans){ e9featTrans.style.transition='none'; e9featTrans.style.transform='translate(190px,503px) scale(0.12)'; }
  return;
 }
 if(act==='hideRays'){ amp.classList.add('e9hide'); return; }
 if(act==='flow'){ e9St.on=true; e9go(); return; }
 if(act==='deflect'){ e9St.arc=true; for(var j=0;j<e9St.parts.length;j++){ e9St.parts[j].el.classList.add('arc'); } return; }
 if(act==='feature'){
  if(!e9feat||!e9featTrans){ return; }
  e9feat.classList.add('in');
  e9featTrans.style.transition='none'; e9featTrans.style.transform='translate(190px,503px) scale(0.12)'; e9featTrans.getBoundingClientRect();
  e9featTrans.style.transition='';
  requestAnimationFrame(function(){ e9featTrans.style.transform='translate(292px,232px) scale(1)'; });
  return;
 }
 if(act==='label'){ if(e9label){ e9label.classList.add('in'); } return; }
}
applyLocks();setBeam();render();
})();
</script>
