<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ampola de Crookes 3D</title>
<style>
html,body{margin:0;background:transparent;overflow:hidden;height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#fff;touch-action:none;-webkit-tap-highlight-color:transparent}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}
/* controles na lateral DIREITA, de baixo p/ cima: On/off, hélice, placas (idênticos ao 2D) */
.amp-ctrls{position:absolute;right:3.5%;bottom:9%;display:flex;flex-direction:column-reverse;align-items:center;gap:clamp(9px,2.6vw,15px);z-index:10}
.amp-sw{position:relative;width:52px;height:27px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);cursor:pointer;padding:0;flex-shrink:0;transition:background .25s,border-color .25s;-webkit-tap-highlight-color:transparent}
.amp-sw::after{content:'';position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;background:#cfd6dd;transition:left .28s cubic-bezier(.4,1.4,.5,1),background .25s,box-shadow .25s}
.amp-sw.on{background:rgba(57,255,20,.22);border-color:rgba(57,255,20,.6)}
.amp-sw.on::after{left:27px;background:#39ff14;box-shadow:0 0 11px rgba(57,255,20,.85)}
.amp-ib{position:relative;width:42px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cdd3da;flex-shrink:0;transition:background .25s,border-color .25s,color .25s;-webkit-tap-highlight-color:transparent}
.amp-ib svg{width:21px;height:21px;display:block}
.amp-ib .led{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:background .25s,box-shadow .25s}
.amp-ib.helice.on{border-color:rgba(80,150,255,.6);background:rgba(80,150,255,.16);color:#9cc8ff}
.amp-ib.helice.on .led{background:#4d8bff;box-shadow:0 0 8px rgba(80,150,255,.95)}
.amp-ib.placas.on{border-color:rgba(255,138,92,.6);background:rgba(255,138,92,.16);color:#ffb38f}
.amp-ib.placas.on .led{background:#ff8a5c;box-shadow:0 0 8px rgba(255,138,92,.95)}
.amp-sw.locked,.amp-ib.locked{opacity:.4;pointer-events:none;filter:saturate(.4)}
/* mãozinha "Ligue a máquina" abaixo do On/off */
.amp-hint{position:absolute;right:calc(3.5% + 12px);bottom:3%;display:flex;align-items:center;gap:5px;z-index:11;opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease;pointer-events:none}
.amp-hint.in{opacity:1;transform:translateY(0)}
.amp-hint-txt{font:700 12.5px/1.05 'Plus Jakarta Sans',system-ui,sans-serif;color:#ffe0b0;background:rgba(18,12,6,.74);padding:5px 8px;border-radius:8px;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.amp-hint-hand{font-size:28px;animation:ampPoint 1s ease-in-out infinite;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
@keyframes ampPoint{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
<h2 class="sr-only">Ampola de Crookes interativa em 3D: tubo de vidro horizontal apoiado num pedestal de madeira sobre uma mesa de laboratório, com botão liga/desliga que faz um raio catódico verde crescer do cátodo ao ânodo, hélice e placas de deflexão removíveis e uma bateria ligada por fios.</h2>
<canvas id="c"></canvas>
<div class="amp-ctrls">
<button id="powerBtn" class="amp-sw" aria-label="Ligar/Desligar" aria-pressed="false"></button>
<button id="propBtn" class="amp-ib helice" aria-label="Hélice" aria-pressed="false"><span class="led"></span><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="2.1"/><g><ellipse cx="12" cy="6.2" rx="2" ry="4.3"/></g><g transform="rotate(120 12 12)"><ellipse cx="12" cy="6.2" rx="2" ry="4.3"/></g><g transform="rotate(240 12 12)"><ellipse cx="12" cy="6.2" rx="2" ry="4.3"/></g></svg></button>
<button id="plateBtn" class="amp-ib placas" aria-label="Placas" aria-pressed="false"><span class="led"></span><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4.4" y="4" width="5.7" height="16" rx="1.6" fill="#74b6ff"/><rect x="13.9" y="4" width="5.7" height="16" rx="1.6" fill="#ff8a72"/></svg></button>
</div>
<div class="amp-hint" id="ampHint"><span class="amp-hint-txt">Ligue a máquina</span><span class="amp-hint-hand" aria-hidden="true">☝️</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  RENDERER + SCENE (mesma base do rutherford_3d)
// ═══════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x070b11, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.fog = new THREE.Fog(0x070b11, 26, 60);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 500);

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ── LIGHTING (mesma receita do rutherford_3d) ──
scene.add(new THREE.AmbientLight(0x222233, 1.5));

const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
keyLight.position.set(-5, 10, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -12; keyLight.shadow.camera.right = 12;
keyLight.shadow.camera.top  =  12; keyLight.shadow.camera.bottom = -12;
keyLight.shadow.camera.near = 0.5; keyLight.shadow.camera.far    = 40;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x4466aa, 0.35);
fillLight.position.set(6, 2, -4);
scene.add(fillLight);

const spotLight = new THREE.SpotLight(0xffe8c0, 0.9, 24, Math.PI / 4.5, 0.5, 1.4);
spotLight.position.set(1, 11, 2);
spotLight.target.position.set(0.2, 0, 0);
scene.add(spotLight); scene.add(spotLight.target);

// ═══════════════════════════════════════════════
//  MADEIRA PROCEDURAL + MESA (idêntica à do rutherford_3d)
// ═══════════════════════════════════════════════
function makeWoodTexture(baseA, baseB) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 512;
  const ctx = cv.getContext('2d');
  const grd = ctx.createLinearGradient(0, 0, 512, 0);
  grd.addColorStop(0, baseA);
  grd.addColorStop(0.5, baseB);
  grd.addColorStop(1, baseA);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 90; i++) {
    const y = Math.random() * 512;
    ctx.strokeStyle = `rgba(${15 + Math.random()*25},${8 + Math.random()*15},${4 + Math.random()*8},${0.12 + Math.random()*0.35})`;
    ctx.lineWidth = 0.4 + Math.random() * 1.3;
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x < 512; x += 6) {
      ctx.lineTo(x, y + Math.sin(x * 0.03 + i) * (0.5 + Math.random() * 2));
    }
    ctx.stroke();
  }
  for (let i = 0; i < 5; i++) {
    const cx = Math.random() * 512, cy = Math.random() * 512;
    const r  = 8 + Math.random() * 22;
    const kg = ctx.createRadialGradient(cx, cy, 1, cx, cy, r);
    kg.addColorStop(0,   'rgba(25,14,6,0.85)');
    kg.addColorStop(0.4, 'rgba(30,18,8,0.4)');
    kg.addColorStop(1,   'rgba(30,18,8,0)');
    ctx.fillStyle = kg;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  }
  const img = ctx.getImageData(0, 0, 512, 512);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 18;
    img.data[i]   = Math.max(0, Math.min(255, img.data[i]   + n));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n));
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
const woodTopTex  = makeWoodTexture('#6d4927', '#825a32');
const woodSideTex = makeWoodTexture('#4d321a', '#5c3d22');

const TABLE_TOP_Y = -1.22;
const TABLE_W     = 16;
const TABLE_D     = 10.5;
const TABLE_THICK = 0.22;
const LEG_H       = 3.8;
const LEG_R       = 0.22;

const topMat  = new THREE.MeshPhongMaterial({ map: woodTopTex, color: 0x8c6538, specular: 0x221510, shininess: 14 });
const sideMat = new THREE.MeshPhongMaterial({ map: woodSideTex, color: 0x6a4625, specular: 0x1a1208, shininess: 10 });

const tableTopGeo = new THREE.BoxGeometry(TABLE_W, TABLE_THICK, TABLE_D);
const tableTop = new THREE.Mesh(tableTopGeo, [ sideMat, sideMat, topMat, sideMat, sideMat, sideMat ]);
tableTop.position.y = TABLE_TOP_Y - TABLE_THICK / 2;
tableTop.receiveShadow = true; tableTop.castShadow = true;
scene.add(tableTop);

const tableEdge = new THREE.LineSegments(
  new THREE.EdgesGeometry(tableTopGeo),
  new THREE.LineBasicMaterial({ color: 0x3a2614, transparent: true, opacity: 0.55 })
);
tableEdge.position.copy(tableTop.position);
scene.add(tableEdge);

const legGeo = new THREE.CylinderGeometry(LEG_R * 0.85, LEG_R, LEG_H, 14);
const legMat = new THREE.MeshPhongMaterial({ map: woodSideTex, color: 0x563822, specular: 0x140a06, shininess: 8 });
const legInset = 0.55;
[
  [-TABLE_W/2 + legInset, -TABLE_D/2 + legInset],
  [ TABLE_W/2 - legInset, -TABLE_D/2 + legInset],
  [-TABLE_W/2 + legInset,  TABLE_D/2 - legInset],
  [ TABLE_W/2 - legInset,  TABLE_D/2 - legInset],
].forEach(([x, z]) => {
  const leg = new THREE.Mesh(legGeo, legMat);
  leg.position.set(x, TABLE_TOP_Y - TABLE_THICK - LEG_H / 2, z);
  leg.castShadow = true; leg.receiveShadow = true;
  scene.add(leg);
  const footGeo = new THREE.CylinderGeometry(LEG_R * 1.1, LEG_R * 1.1, 0.08, 14);
  const footMat = new THREE.MeshPhongMaterial({ color: 0x222228, specular: 0x666677, shininess: 40 });
  const foot = new THREE.Mesh(footGeo, footMat);
  foot.position.set(x, TABLE_TOP_Y - TABLE_THICK - LEG_H + 0.04, z);
  foot.castShadow = true;
  scene.add(foot);
});

// Chão p/ receber sombras
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshPhongMaterial({ color: 0x0a0a10, specular: 0x050510, shininess: 3 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = TABLE_TOP_Y - TABLE_THICK - LEG_H;
floor.receiveShadow = true;
scene.add(floor);

// ═══════════════════════════════════════════════
//  MATERIAIS METÁLICOS COMPARTILHADOS
// ═══════════════════════════════════════════════
function metalMat(color, extra) {
  return new THREE.MeshPhongMaterial(Object.assign({
    color: color, specular: 0xd8e2ea, shininess: 85, emissive: 0x0c0e12,
  }, extra || {}));
}

// ═══════════════════════════════════════════════
//  GRUPO DA AMPOLA — TUBO HORIZONTAL (eixo X) sobre pedestal de madeira
//  (origem do grupo = centro do tubo, no eixo do raio)
// ═══════════════════════════════════════════════
const TUBE_CX  = 0.2;                       // centro do tubo no mundo (x)
const AXIS_Y   = TABLE_TOP_Y + 2.05;        // altura do eixo do tubo (pedestal alto, como na referência)
const tubeGroup = new THREE.Group();
tubeGroup.position.set(TUBE_CX, AXIS_Y, 0);
scene.add(tubeGroup);

// ── Pedestal de madeira torneado (base redonda + balaústre + argola-berço) ──
const pedestalMat = new THREE.MeshPhongMaterial({ map: woodSideTex, color: 0xb4732e, specular: 0x40220c, shininess: 32 });
const PED_Y0 = TABLE_TOP_Y - AXIS_Y;        // topo da mesa em coords locais
const pedBase = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.80, 0.12, 28), pedestalMat);
pedBase.position.set(0, PED_Y0 + 0.06, 0);
pedBase.castShadow = true; pedBase.receiveShadow = true;
tubeGroup.add(pedBase);
const pedBase2 = new THREE.Mesh(new THREE.CylinderGeometry(0.50, 0.60, 0.10, 24), pedestalMat);
pedBase2.position.set(0, PED_Y0 + 0.17, 0);
pedBase2.castShadow = true;
tubeGroup.add(pedBase2);

const balusterPts = [
  [0.34, 0.00], [0.30, 0.10], [0.20, 0.20], [0.17, 0.34], [0.26, 0.52],
  [0.30, 0.66], [0.22, 0.80], [0.17, 0.96], [0.24, 1.14], [0.28, 1.26],
  [0.18, 1.36], [0.14, 1.48], [0.20, 1.58], [0.24, 1.62],
].map(p => new THREE.Vector2(p[0], p[1]));
const baluster = new THREE.Mesh(new THREE.LatheGeometry(balusterPts, 26), pedestalMat);
baluster.position.set(0, PED_Y0 + 0.22, 0);
baluster.castShadow = true;
tubeGroup.add(baluster);

// argola-berço metálica em volta do centro do tubo
const cradle = new THREE.Mesh(new THREE.TorusGeometry(0.66, 0.045, 12, 30), metalMat(0x8a6a3a, { specular: 0xd8b878 }));
cradle.rotation.y = Math.PI / 2;   // eixo da argola ao longo de X (abraça o tubo)
tubeGroup.add(cradle);

// ── Vidro do tubo (horizontal; leve bojo no centro, gargalos nas pontas) ──
const HALF_LEN = 2.10;
const glassPts = [
  [0.00, 0.00], [0.16, 0.01], [0.30, 0.05], [0.40, 0.14], [0.44, 0.30],
  [0.50, 0.75], [0.58, 1.55], [0.62, 2.10], [0.58, 2.65], [0.50, 3.45],
  [0.44, 3.90], [0.40, 4.06], [0.30, 4.15], [0.16, 4.19], [0.00, 4.20],
].map(p => new THREE.Vector2(p[0], p[1]));
const glassGeo = new THREE.LatheGeometry(glassPts, 48);
const glassMat = new THREE.MeshPhongMaterial({
  color: 0xbfe3f2, specular: 0xffffff, shininess: 140, emissive: 0x0a141c,
  transparent: true, opacity: 0.16, side: THREE.DoubleSide, depthWrite: false,
});
const glassMesh = new THREE.Mesh(glassGeo, glassMat);
glassMesh.rotation.z = -Math.PI / 2;        // deita o tubo: eixo do lathe (+Y) vira +X
glassMesh.position.x = -HALF_LEN;
glassMesh.renderOrder = 6;
glassMesh.castShadow = true;
tubeGroup.add(glassMesh);

// virolas metálicas nas duas pontas + terminais
[-1, 1].forEach(sx => {
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.31, 0.31, 0.20, 22), metalMat(0x9aa2ab));
  cap.rotation.z = Math.PI / 2;
  cap.position.set(sx * 2.06, 0, 0);
  cap.castShadow = true;
  tubeGroup.add(cap);
  const nip = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.16, 10), metalMat(0x7c828b));
  nip.rotation.z = Math.PI / 2;
  nip.position.set(sx * 2.20, 0, 0);
  tubeGroup.add(nip);
  const ball = new THREE.Mesh(new THREE.SphereGeometry(0.085, 12, 10), metalMat(0xc4ccd4));
  ball.position.set(sx * 2.30, 0, 0);
  tubeGroup.add(ball);
});

// brilho interno verde (tubeglow do 2D): aparece quando ligada
const tubeGlow = new THREE.Mesh(
  new THREE.SphereGeometry(1, 24, 18),
  new THREE.MeshBasicMaterial({ color: 0x39ff14, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false })
);
tubeGlow.scale.set(1.85, 0.52, 0.52);
tubeGlow.renderOrder = 2;
tubeGroup.add(tubeGlow);

// ── Cátodo (esquerda) e ânodo (direita), dentro do tubo ──
const electrodeMat = metalMat(0xaab2bb, { specular: 0xffffff, shininess: 95 });
const cathodeDisc = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.30, 0.06, 22), electrodeMat);
cathodeDisc.rotation.z = Math.PI / 2;
cathodeDisc.position.set(-1.70, 0, 0);
tubeGroup.add(cathodeDisc);
const cathodeStem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.38, 10), electrodeMat);
cathodeStem.rotation.z = Math.PI / 2;
cathodeStem.position.set(-1.90, 0, 0);
tubeGroup.add(cathodeStem);

const anodeDisc = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.28, 0.06, 22), electrodeMat);
anodeDisc.rotation.z = Math.PI / 2;
anodeDisc.position.set(1.70, 0, 0);
tubeGroup.add(anodeDisc);
const anodeStem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.38, 10), electrodeMat);
anodeStem.rotation.z = Math.PI / 2;
anodeStem.position.set(1.90, 0, 0);
tubeGroup.add(anodeStem);

// ═══════════════════════════════════════════════
//  BATERIA + FIOS (bateria atrás, à esquerda — como na referência)
// ═══════════════════════════════════════════════
const battGroup = new THREE.Group();
battGroup.position.set(-2.45, TABLE_TOP_Y, -0.95);
scene.add(battGroup);

const battGeo = new THREE.BoxGeometry(0.62, 1.38, 0.52);
const battMesh = new THREE.Mesh(battGeo, new THREE.MeshPhongMaterial({
  color: 0x252b33, specular: 0x6a7684, shininess: 55, emissive: 0x0a0d11,
}));
battMesh.position.y = 0.69;
battMesh.castShadow = true; battMesh.receiveShadow = true;
battGroup.add(battMesh);
battGroup.add((() => {
  const e = new THREE.LineSegments(new THREE.EdgesGeometry(battGeo), new THREE.LineBasicMaterial({ color: 0x59636e, transparent: true, opacity: 0.5 }));
  e.position.y = 0.69; return e;
})());

// terminais + e −
const termPlus  = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.12, 12), metalMat(0xc9a35a, { specular: 0xffe8b0 }));
termPlus.position.set(0.16, 1.44, 0);
battGroup.add(termPlus);
const termMinus = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.12, 12), metalMat(0x8fb4d8, { specular: 0xd8ecff }));
termMinus.position.set(-0.16, 1.44, 0);
battGroup.add(termMinus);

// rótulo "Bateria" + sinais +/− (texturas canvas)
function textTexture(lines, opts) {
  opts = opts || {};
  const w = opts.w || 256, h = opts.h || 96;
  const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  if (opts.bg) { ctx.fillStyle = opts.bg; ctx.fillRect(0, 0, w, h); }
  ctx.font = (opts.weight || '700') + ' ' + (opts.px || 42) + 'px "Plus Jakarta Sans", system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = opts.color || '#cdd3da';
  const arr = Array.isArray(lines) ? lines : [lines];
  arr.forEach((t, i) => ctx.fillText(t, w / 2, h / 2 + (i - (arr.length - 1) / 2) * (opts.px || 42) * 1.15));
  const tex = new THREE.CanvasTexture(cv);
  return tex;
}
function labelPlane(text, opts) {
  opts = opts || {};
  const tex = textTexture(text, opts);
  const w = opts.worldW || 0.9;
  const h = w * ((opts.h || 96) / (opts.w || 256));
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false })
  );
  m.renderOrder = 8;
  return m;
}
const battLabel = labelPlane('Bateria', { color: '#c9ced4', px: 40, worldW: 0.62 });
battLabel.position.set(0, 0.5, 0.27);
battGroup.add(battLabel);
const battPlus = labelPlane('+', { color: '#d8a96e', px: 60, w: 96, h: 96, worldW: 0.16 });
battPlus.position.set(0.16, 1.28, 0.27);
battGroup.add(battPlus);
const battMinus = labelPlane('−', { color: '#7fb0e0', px: 60, w: 96, h: 96, worldW: 0.16 });
battMinus.position.set(-0.16, 1.28, 0.27);
battGroup.add(battMinus);

// fios: vermelho (+ -> ânodo, ponta DIREITA) e azul (− -> cátodo, ponta ESQUERDA)
function wire(points, color) {
  const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p[0], p[1], p[2])));
  const geo = new THREE.TubeGeometry(curve, 64, 0.035, 8, false);
  const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
    color: color, specular: 0x333333, shininess: 30, emissive: 0x060606,
  }));
  mesh.castShadow = true;
  scene.add(mesh);
  return mesh;
}
const TERM_R_X = TUBE_CX + 2.30, TERM_L_X = TUBE_CX - 2.30;
wire([
  [-2.29, TABLE_TOP_Y + 1.50, -0.95],
  [-1.50, TABLE_TOP_Y + 0.70, -1.40],
  [ 0.80, TABLE_TOP_Y + 0.55, -1.45],
  [ 2.85, TABLE_TOP_Y + 1.40, -0.80],
  [TERM_R_X + 0.06, AXIS_Y - 0.06, -0.14],
  [TERM_R_X, AXIS_Y, 0],
], 0xbb4f29);
wire([
  [-2.61, TABLE_TOP_Y + 1.50, -0.95],
  [-2.95, TABLE_TOP_Y + 0.70, -0.65],

  const a = camTween.from, b = camTween.to;
  camTheta = a.theta + (b.theta - a.theta) * e;
  camPhi   = a.phi   + (b.phi   - a.phi)   * e;
  camDist  = a.dist  + (b.dist  - a.dist)  * e;
  camTarget.set(a.tx + (b.tx - a.tx) * e, a.ty + (b.ty - a.ty) * e, a.tz + (b.tz - a.tz) * e);
  applyCam();
  if (k >= 1) camTween = null;
}
// DEV: "C" captura a câmera atual; "L" alterna a trava (p/ navegar e capturar sets)
window.addEventListener('keydown', (ev) => {
  if (ev.key === 'l' || ev.key === 'L') {
    camLocked = !camLocked;
    console.log('[CAM] locked =', camLocked);
    try { alert('camLocked = ' + camLocked); } catch (_) {}
    return;
  }
  if (ev.key !== 'c' && ev.key !== 'C') return;
  const line = 'set?: { target: [' + camTarget.x.toFixed(3) + ', ' + camTarget.y.toFixed(3) + ', ' +
    camTarget.z.toFixed(3) + '], theta: ' + camTheta.toFixed(4) + ', phi: ' + camPhi.toFixed(4) +
    ', dist: ' + camDist.toFixed(3) + ' }';
  console.log('[CAM]', line);
  try { if (navigator.clipboard) navigator.clipboard.writeText(line); } catch (_) {}
  try { alert(line); } catch (_) {}
});
// navegação (só quando destravada com "L", p/ capturar presets)
let dragOn = false, dragX = 0, dragY = 0;
canvas.addEventListener('mousedown', e => { dragOn = true; dragX = e.clientX; dragY = e.clientY; });
window.addEventListener('mousemove', e => {
  if (!dragOn || camLocked) return;
  camTheta -= (e.clientX - dragX) * 0.007;
  camPhi   += (e.clientY - dragY) * 0.007;
  dragX = e.clientX; dragY = e.clientY;
  applyCam();
});
window.addEventListener('mouseup', () => { dragOn = false; });
window.addEventListener('wheel', e => { if (camLocked) return; e.preventDefault(); camDist += e.deltaY * 0.02; applyCam(); }, { passive: false });

// ═══════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════
const _clock = new THREE.Clock();
function update() {
  const dt = Math.min(0.05, _clock.getDelta());
  const tNow = performance.now() / 1000;
  updateCamTween();

  // raio cresce/recolhe (.72s) + brilho do cátodo (.5s)
  const gTgt = on ? 1 : 0;
  growT += Math.sign(gTgt - growT) * Math.min(Math.abs(gTgt - growT), dt / 0.72);
  glowT += Math.sign(gTgt - glowT) * Math.min(Math.abs(gTgt - glowT), dt / 0.5);
  // hideRays (dialogo3.5.9): .8s
  e9Mul += Math.sign(e9MulTarget - e9Mul) * Math.min(Math.abs(e9MulTarget - e9Mul), dt / 0.8);

  const fm = (on ? flickerMul(tNow) : 1) * e9Mul;
  const ease = growT * growT * (3 - 2 * growT);   // smoothstep
  const idxTotal = TUBULAR * RADIAL * 6;
  beamMeshes.forEach((m, i) => {
    m.material.opacity = BEAM_LAYERS[i].op * fm * (growT > 0 ? 1 : 0);
    m.geometry.setDrawRange(0, Math.floor(idxTotal * ease / 6) * 6);
  });
  cathodeGlow.forEach(s => { s.material.opacity = s.userData.baseOp * glowT * fm; });
  tubeGlow.material.opacity = 0.10 * glowT * e9Mul;
  beamLight.intensity   = 1.5 * ease * fm;
  cathodeLight.intensity = 0.9 * glowT * fm;

  // hélice: presença (desce + some) e giro (ease-in, sentido invertido)
  const pTgt = hasProp ? 1 : 0;
  propT += Math.sign(pTgt - propT) * Math.min(Math.abs(pTgt - propT), dt / 0.42);
  propGroup.position.y = PROP_HUB_Y - (1 - propT) * 0.5;
  propMats.forEach(m => { m.opacity = propT; });
  propGroup.visible = propT > 0.01;
  const spinning = (on && hasProp && !hasPlates);
  const MAXV = 60;
  if (spinning) { wVel += (6 + wVel * 0.5) * dt; if (wVel > MAXV) { wVel = MAXV; } }
  else { wVel += (0 - wVel) * Math.min(1, dt * 1.6); if (wVel < 0.4) { wVel = 0; } }
  wAngle = (wAngle - wVel * dt) % 360;
  wheel.rotation.z = wAngle * Math.PI / 180;

  // placas: deslizam de cima/baixo + fade
  const plTgt = hasPlates ? 1 : 0;
  plateT += Math.sign(plTgt - plateT) * Math.min(Math.abs(plTgt - plateT), dt / 0.42);
  [plateLGroup, plateRGroup].forEach(g => {
    const side = g.userData.side;
    g.position.y = side * (0.34 + (1 - plateT) * 0.5);
    g.userData.mats.forEach(m => { m.opacity = plateT; });
    g.visible = plateT > 0.01;
  });

  // rótulo "Raios catódicos" (fade .5s)
  const rl = rayLabel.material.opacity;
  rayLabel.material.opacity = rl + Math.sign(rayLabelTarget - rl) * Math.min(Math.abs(rayLabelTarget - rl), dt / 0.5);

  // pulso do "cátodo (−)": 3 ciclos de .34s (escala 1->1.2 + amarelo)
  if (catPulseT >= 0) {
    catPulseT += dt;
    const cyc = catPulseT / 0.34;
    if (cyc >= 3) { catPulseT = -1; catLabel.scale.setScalar(1); catLabel.material.map = catTexNormal; }
    else {
      const k = Math.sin((cyc % 1) * Math.PI);
      catLabel.scale.setScalar(1 + 0.2 * k);
      catLabel.material.map = k > 0.4 ? catTexPulse : catTexNormal;
    }
  }
  // pulso da placa +: 2 ciclos de .5s (escala 1->1.13)
  if (platePulseT >= 0) {
    platePulseT += dt;
    const cyc = platePulseT / 0.5;
    if (cyc >= 2) { platePulseT = -1; plateRGroup.scale.setScalar(1); }
    else { plateRGroup.scale.setScalar(1 + 0.13 * Math.sin((cyc % 1) * Math.PI)); }
  }

  // e9: fluxo de elétrons (mesma lógica do 2D)
  if (!on) { e9Clear(); }
  else if (e9St.active) {
    e9St.acc += dt;
    while (e9St.acc >= E9_SPAWN) { e9St.acc -= E9_SPAWN; e9Spawn(); }
  }
  for (let i = e9St.parts.length - 1; i >= 0; i--) {
    const p = e9St.parts[i];
    p.t += E9_SPEED * dt;
    if (p.t >= 1) { tubeGroup.remove(p.spr); e9St.parts.splice(i, 1); continue; }
    p.spr.position.copy(beamLocalPos(p.t, hasPlates));
    if (p.spr.userData.sign !== hasPlates) { p.spr.material.map = hasPlates ? eTexSign : eTexPlain; p.spr.userData.sign = hasPlates; }
  }
  // elétron em destaque: cresce do cátodo até o ponto de exibição (1.1s)
  if (e9FeatAnim.active) {
    e9FeatAnim.t = Math.min(1, e9FeatAnim.t + dt / 1.1);
    const k = 1 - Math.pow(1 - e9FeatAnim.t, 3);
    e9Feat.position.lerpVectors(E9_FEAT_START, E9_FEAT_END, k);
    e9Feat.scale.setScalar(0.12 + 0.88 * k);
    if (e9FeatAnim.t >= 1) { e9FeatAnim.active = false; }
  }
  if (e9Feat.visible) {
    featGlow.material.opacity = 0.24 + 0.11 * Math.sin(tNow * 2 * Math.PI / 2.4);
    if (featLabel.userData.fadeIn && featLabel.material.opacity < 1) {
      featLabel.material.opacity = Math.min(1, featLabel.material.opacity + dt / 0.55);
    }
  }

  // rótulos sempre de frente pra câmera
  billboards.forEach(b => { b.quaternion.copy(camera.quaternion); });
}

function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
applyLocks(); render(); resize(); applyCam(); animate();
</script>
